<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: deep indigo to vivid purple -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="50%" stop-color="#2d0b5a"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>

    <!-- L letter gradient: light lavender to neon magenta -->
    <linearGradient id="lGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="55%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>

    <!-- Highlight bar gradient: neon cyan to violet -->
    <linearGradient id="hlGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle radial highlight for top-left -->
    <radialGradient id="topHighlight" cx="25%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background (iOS-style ~22.5% radius) -->
  <rect width="1024" height="1024" rx="230" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#topHighlight)"/>

  <!-- Decorative text lines (representing scanned/learned words) -->
  <g opacity="0.85">
    <rect x="500" y="300" width="280" height="36" rx="18" fill="#22d3ee" opacity="0.85"/>
    <rect x="500" y="380" width="220" height="36" rx="18" fill="#a78bfa" opacity="0.70"/>
    <rect x="500" y="460" width="260" height="36" rx="18" fill="#22d3ee" opacity="0.55"/>
    <rect x="500" y="540" width="180" height="36" rx="18" fill="#a78bfa" opacity="0.40"/>
  </g>

  <!-- Stylized "L" with glow -->
  <g filter="url(#softGlow)">
    <!-- Vertical bar -->
    <rect x="280" y="240" width="130" height="480" rx="65" fill="url(#lGrad)"/>
    <!-- Horizontal bar (the highlight stroke) -->
    <rect x="280" y="660" width="440" height="130" rx="65" fill="url(#lGrad)"/>
  </g>

  <!-- Neon accent dot (top-right sparkle - the "AI" / intelligence mark) -->
  <g filter="url(#softGlow)">
    <circle cx="820" cy="260" r="26" fill="#f0abfc"/>
    <circle cx="820" cy="260" r="12" fill="#ffffff"/>
  </g>
</svg>
