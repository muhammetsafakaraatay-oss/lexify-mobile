<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lGradMark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="55%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Transparent background; only the mark -->

  <!-- Text lines -->
  <g opacity="0.9">
    <rect x="250" y="150" width="140" height="18" rx="9" fill="url(#cyanGrad)" opacity="0.95"/>
    <rect x="250" y="190" width="110" height="18" rx="9" fill="#a78bfa" opacity="0.75"/>
    <rect x="250" y="230" width="130" height="18" rx="9" fill="url(#cyanGrad)" opacity="0.60"/>
    <rect x="250" y="270" width="90" height="18" rx="9" fill="#a78bfa" opacity="0.45"/>
  </g>

  <!-- "L" letter -->
  <rect x="140" y="120" width="65" height="240" rx="32" fill="url(#lGradMark)"/>
  <rect x="140" y="330" width="220" height="65" rx="32" fill="url(#lGradMark)"/>

  <!-- Sparkle -->
  <circle cx="410" cy="130" r="13" fill="#f0abfc"/>
  <circle cx="410" cy="130" r="6" fill="#ffffff"/>
</svg>
